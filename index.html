<meta charset="utf-8">
<title>Metzler Kaufberater</title>
<style>
  :root{
    --font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    --teal:#015253; --teal-600:#014A4B; --teal-700:#01292A;
    --teal-5:rgba(1,82,83,0.05); --teal-10:rgba(1,82,83,0.10); --teal-100:#E6EEEE;
    --schwarz:#1A171B; --green:#009951; --status-warning:#B4610A;
    --white:#FFFFFF; --paper-white:#F5F6FA;
    --graphite-100:#F0F0F0; --graphite-300:#DADADA; --graphite-500:#A1A1A1;
    --line:var(--graphite-300); --ink-60:rgba(0,0,0,0.6); --ink-72:rgba(0,0,0,0.72);
    --text-h4:1.125rem; --text-body:1rem; --text-body-sm:0.875rem; --text-caption:0.75rem;
    --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
    --r-m:4px; --r-l:8px; --r-pill:9999px;
    --shadow-md:0 4px 12px rgba(0,0,0,0.08); --shadow-lg:0 12px 32px rgba(0,0,0,0.12);
    --container:1440px;   /* matches the LIVE JTL .mw-container on edelstahl-tuerklingel.de: max-width 1440/1500/1600 + padding 20/50/100 across breakpoints (see .container below) */
  }
  *{box-sizing:border-box}
  /* Always reserve the vertical scrollbar gutter so the standalone preview's content width
     matches the real (long, scrolling) PLP page — otherwise a short collapsed page is ~15px wider. */
  html{overflow-y:scroll}
  body{margin:0;background:var(--paper-white);color:var(--ink-72);font-family:var(--font-family);
    line-height:1.55;font-size:var(--text-body);-webkit-font-smoothing:antialiased}
  /* Width parity with the live JTL .mw-container (mobile-first translation of its max-width media queries):
     <=767 -> max 1440 / pad 20 ; 768-1400 -> max 1500 / pad 50 ; >1400 -> max 1600 / pad 100. */
  .container{width:100%;max-width:var(--container);margin:0 auto;padding:24px 20px 72px}
  @media (min-width:768px){:root{--container:1500px} .container{padding-left:50px;padding-right:50px}}
  @media (min-width:1401px){:root{--container:1600px} .container{padding-left:100px;padding-right:100px}}
  a{color:var(--teal)}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3{margin:0;color:var(--schwarz);line-height:1.3}

  /* Page framing (stands in for the category-page header on this standalone preview) */
  .page-head{display:flex;align-items:center;gap:10px;padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid var(--line)}
  .page-head svg{width:30px;height:30px;display:block;flex:none}
  .page-head .wm{font-weight:800;letter-spacing:.14em;font-size:1.0625rem;color:var(--schwarz)}
  .page-head .ct{font-size:var(--text-body-sm);color:var(--ink-60);padding-left:10px;margin-left:2px;border-left:1px solid var(--graphite-300)}
  .plp-note{font-size:var(--text-caption);color:var(--ink-60);text-align:center;margin-top:28px;line-height:1.6}
  /* Category switcher (standalone preview only; hidden when the embedding page already sets the category) */
  .cat-switch{margin-left:auto;display:inline-flex;gap:4px;padding:3px;background:var(--graphite-100);border-radius:var(--r-pill)}
  .cat-switch[hidden]{display:none}
  .cat-switch button{border:0;background:none;color:var(--ink-60);font-family:inherit;font-size:var(--text-body-sm);
    font-weight:600;padding:5px 14px;border-radius:var(--r-pill);line-height:1.2}
  .cat-switch button.is-on{background:var(--white);color:var(--teal);box-shadow:0 1px 2px rgba(0,0,0,.08)}

  /* ── Advisor (ported from Metzler PLP plp.css) ── */
  .advisor{padding-block:var(--sp-4)}
  .advisor__bar{
    width:100%;display:flex;align-items:center;gap:var(--sp-4);text-align:left;
    padding:var(--sp-5) var(--sp-6);border:1px solid var(--teal-10);border-radius:var(--r-l);
    background:linear-gradient(135deg,var(--teal-5) 0%,#EDF3F3 100%);
    box-shadow:inset 0 0 0 1px var(--teal-10);transition:border-color .2s,box-shadow .2s}
  .advisor__bar:hover{border-color:rgba(1,82,83,0.25);box-shadow:var(--shadow-md)}
  .advisor__bar:focus-visible{outline:none;box-shadow:0 0 0 3px var(--teal-10)}
  .advisor__bar-txt{display:flex;flex-direction:column;align-items:flex-start;gap:4px;min-width:0}
  .advisor__bar-head{display:flex;align-items:center;gap:var(--sp-3)}
  .advisor__bar-title{font-size:var(--text-body);font-weight:700;color:var(--schwarz);line-height:1.3}
  .advisor__bar-sub{font-size:var(--text-body-sm);color:var(--ink-60)}
  .advisor__bar-cta{margin-left:auto;display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;
    font-size:var(--text-body-sm);font-weight:700;color:var(--teal)}
  .advisor__bar-cta svg{width:24px;height:24px;transform:rotate(90deg)}

  .advisor:not(.is-open) .advisor__card{display:none}
  .advisor.is-open .advisor__bar{display:none}

  .advisor__card{
    position:relative;padding:clamp(20px,2.4vw,28px);border-radius:var(--r-l);
    background:linear-gradient(135deg,var(--teal-5) 0%,#EDF3F3 100%);
    box-shadow:inset 0 0 0 1px var(--teal-10),0 1px 3px rgba(26,23,27,.05)}
  .advisor__collapse{position:absolute;top:14px;right:14px;width:32px;height:32px;display:grid;place-items:center;
    background:none;border:0;color:var(--teal);border-radius:var(--r-m)}
  .advisor__collapse:hover{color:var(--teal-700)}
  .advisor__collapse:focus-visible{outline:none;box-shadow:0 0 0 3px var(--teal-10)}
  .advisor__collapse svg{width:24px;height:24px;transform:rotate(-90deg)}

  /* Chips (PILL RULE: text-only, Teal-100 fill on the teal card, Teal-700 label, no icon) */
  .advisor__chip{display:inline-flex;align-items:center;font-family:inherit;font-size:var(--text-body-sm);
    font-weight:700;letter-spacing:.02em;color:var(--teal-700);background:var(--teal-100);
    border:1px solid var(--teal-10);border-radius:var(--r-pill);padding:4px 11px;line-height:1.3}
  button.advisor__chip{cursor:pointer;transition:box-shadow .15s,border-color .15s}
  button.advisor__chip:hover{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-10)}
  button.advisor__chip:focus-visible{outline:none;box-shadow:0 0 0 3px var(--teal-10)}
  .advisor__chip small{font-weight:400;color:var(--teal-700);opacity:.7;margin-right:5px}
  .advisor__chip-edit{width:13px;height:13px;margin-left:6px;flex:none;opacity:.75;transition:opacity .15s}
  button.advisor__chip:hover .advisor__chip-edit,button.advisor__chip:focus-visible .advisor__chip-edit{opacity:1}

  /* Progress */
  .advisor__progress{display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-4)}
  .advisor__progress-dots{display:inline-flex;gap:6px}
  .advisor__progress-dots span{width:26px;height:3px;border-radius:var(--r-pill);background:var(--graphite-300);transition:background .3s ease}
  .advisor__progress-dots span.is-done,.advisor__progress-dots span.is-current{background:var(--teal)}
  .advisor__progress-dots span.is-current{opacity:.55}
  .advisor__progress-label{font-size:var(--text-body-sm);font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-60)}

  /* Step */
  .advisor__step{opacity:0;transform:translateY(10px);transition:opacity .32s ease,transform .32s ease}
  .advisor__step.is-in{opacity:1;transform:none}
  .advisor__q{margin:0 0 var(--sp-4);font-size:var(--text-h4);font-weight:700;line-height:1.375;color:var(--schwarz)}
  .advisor__q .en{display:block;font-size:var(--text-body-sm);font-weight:400;font-style:italic;color:var(--ink-60);margin-top:3px}
  .advisor__help{margin:-8px 0 var(--sp-4);font-size:var(--text-body-sm);color:var(--ink-60);max-width:60ch}

  .advisor__opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:var(--sp-3)}
  .advisor__opts--swatch{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .advisor__opt{
    display:flex;flex-flow:column nowrap;align-items:flex-start;gap:3px;text-align:left;
    padding:12px 14px;border:1px solid var(--graphite-300);border-radius:var(--r-l);background:var(--white);
    transition:border-color .15s,background .15s,box-shadow .15s}
  .advisor__opt:hover{border-color:var(--teal)}
  .advisor__opt:focus-visible{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-10)}
  .advisor__opt.is-active{border-color:var(--teal);background:var(--teal-5)}
  .advisor__opt-label{font-size:var(--text-body-sm);font-weight:500;color:var(--schwarz)}
  .advisor__opt-sub{font-size:var(--text-body-sm);color:var(--ink-60);line-height:1.4}
  .advisor__opt.is-off{cursor:default;background:var(--graphite-100)}
  .advisor__opt.is-off:hover{border-color:var(--graphite-300);box-shadow:none}
  .advisor__opt.is-off .advisor__opt-label{color:var(--ink-60)}
  .advisor__opt-note{font-size:var(--text-body-sm);color:var(--status-warning);line-height:1.4}
  .advisor__opt-switch{color:var(--teal);font-weight:600;text-decoration:underline;cursor:pointer}
  .advisor__opt-count{font-size:12px;color:#6A6A6A;font-weight:600;font-variant-numeric:tabular-nums;margin-top:auto;padding-top:6px}
  .advisor__opt.has-swatch{flex-direction:row;align-items:flex-start;gap:14px;transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease}
  .advisor__opt.has-swatch:hover{transform:translateY(-2px);box-shadow:0 6px 14px -8px rgba(0,0,0,.18)}
  .advisor__opt.has-swatch .advisor__opt-body{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .advisor__opt.has-swatch .advisor__opt-count{margin-top:4px}
  .advisor__opt.has-swatch .advisor__opt-sub{display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .advisor__swatch{position:relative;width:88px;height:60px;border-radius:12px;flex:none;overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.22), 0 0 0 1px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.13)}
  .advisor__swatch::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(145deg,rgba(255,255,255,.26),rgba(255,255,255,0) 46%,rgba(0,0,0,.05))}
  .advisor__hint{margin:-4px 0 var(--sp-4);padding:9px 12px;font-size:var(--text-body-sm);color:var(--ink-60);
    background:var(--teal-5);border-left:3px solid var(--teal);border-radius:6px;max-width:72ch;line-height:1.45}
  .advisor__hint.advisor__flash{color:var(--status-warning);background:transparent;border-left-color:var(--status-warning)}

  /* Nav */
  .advisor__nav{display:flex;align-items:center;justify-content:space-between;margin-top:var(--sp-5);gap:12px 16px;flex-wrap:wrap}
  .advisor__nav-left{display:flex;align-items:center;gap:var(--sp-4);flex-wrap:wrap;min-width:0}
  .advisor__back,.advisor__forward{display:inline-flex;align-items:center;gap:6px;background:none;border:0;
    font-size:var(--text-body-sm);font-weight:600;line-height:1.2;padding:6px 2px}
  .advisor__back{color:var(--ink-60)} .advisor__back:hover{color:var(--teal)}
  .advisor__forward{color:var(--teal)} .advisor__forward:hover{color:var(--teal-700)}
  .advisor__forward--cta{background:var(--teal);color:#fff;border-radius:var(--r-m);padding:.7rem 1.2rem;font-weight:500}
  .advisor__forward--cta:hover{background:var(--teal-600);color:#fff}
  .advisor__forward[disabled]{opacity:.4;cursor:not-allowed}
  .advisor__back svg,.advisor__forward svg{width:1.3em;height:1.3em;flex:0 0 auto}
  .advisor__count{margin:0;font-size:var(--text-body-sm);color:var(--ink-60)}
  .advisor__count b{color:var(--teal);font-weight:700;font-variant-numeric:tabular-nums}
  .advisor__count.is-none{color:var(--status-warning)} .advisor__count.is-none b{color:var(--status-warning)}
  .advisor__back svg{transform:rotate(180deg)}

  /* Results */
  .advisor__results[hidden]{display:none}
  .advisor.is-result .advisor__quiz{display:none}
  .advisor__result{display:flex;flex-direction:column;gap:var(--sp-4);opacity:0;transform:translateY(10px);
    transition:opacity .4s ease,transform .4s ease}
  .advisor__result.is-in{opacity:1;transform:none}
  .advisor__result-title{margin:0;font-size:var(--text-h4);font-weight:700;color:var(--schwarz)}
  .advisor__recs{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--sp-4);align-items:stretch}
  .advisor__rec{display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-4);border:1px solid var(--graphite-300);
    border-radius:var(--r-l);background:var(--white);text-decoration:none;color:inherit;transition:box-shadow .25s,border-color .25s}
  .advisor__rec:hover{border-color:var(--teal);box-shadow:var(--shadow-md)}
  .advisor__rec.is-best{border-color:var(--teal)}
  /* single-match spotlight: one lone card would stretch full-width and look broken */
  .advisor__recs--solo{display:block}
  .advisor__rec--solo{max-width:760px}
  .advisor__rec-solo-row{display:flex;flex-direction:row;align-items:flex-start;gap:var(--sp-5)}
  .advisor__rec--solo .advisor__rec-thumb--img{width:150px;height:150px}
  .advisor__rec-solo-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:6px}
  @media (max-width:560px){.advisor__rec-solo-row{flex-direction:column}}
  .advisor__rec-top{display:flex;align-items:flex-start;gap:var(--sp-3)}
  .advisor__rec-thumb{flex:0 0 auto;width:64px;height:64px;border-radius:var(--r-m);background:var(--teal-5);
    color:var(--teal);display:grid;place-items:center}
  .advisor__rec-thumb svg{width:32px;height:32px}
  .advisor__rec-thumb--img{background:#fff;overflow:hidden}
  .advisor__rec-thumb--img img{width:100%;height:100%;object-fit:contain;display:block}
  .advisor__rec-head{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:5px}
  .advisor__rec-badges{display:flex;flex-wrap:wrap;gap:5px}
  .advisor__rec-sys{font-size:var(--text-caption);font-weight:500;letter-spacing:.02em;white-space:nowrap;
    color:var(--schwarz);background:var(--graphite-100);box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);border-radius:999px;padding:2px 9px}
  .advisor__rec-best{font-size:var(--text-caption);font-weight:600;text-transform:uppercase;letter-spacing:.04em;
    color:var(--teal);background:none;padding:2px 0}
  .advisor__rec-name{font-size:var(--text-body-sm);font-weight:700;line-height:1.375;color:var(--schwarz)}
  .advisor__rec-price{font-size:var(--text-body);font-weight:700;color:var(--schwarz);white-space:nowrap}
  .advisor__rec-price small{font-weight:400;color:var(--ink-60);font-size:var(--text-caption)}
  .advisor__rec-features{list-style:none;margin:0;padding:var(--sp-3) 0 0;border-top:1px solid var(--line);
    display:flex;flex-direction:column;gap:8px}
  .advisor__rec-features li{position:relative;padding-left:24px;font-size:var(--text-body-sm);line-height:1.45;color:var(--ink-72)}
  .advisor__rec-features li::before{content:"";position:absolute;left:6px;top:3px;width:6px;height:11px;
    border:solid var(--teal);border-width:0 2px 2px 0;transform:rotate(45deg)}
  .advisor__rec-go{display:inline-flex;align-items:center;gap:5px;margin-top:auto;font-size:var(--text-body-sm);font-weight:600;color:var(--teal)}
  .advisor__rec-chev{flex:0 0 auto;align-self:center;margin-left:auto;display:inline-flex;color:var(--teal)}
  .advisor__rec-chev svg{width:34px;height:34px}
  .advisor__rec-go svg{width:18px;height:18px}

  /* Summary + actions */
  .advisor__summary{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
  .advisor__summary-hint{width:100%;font-size:var(--text-caption);color:var(--ink-60);margin:2px 0 0}
  .advisor__actions{display:flex;flex-wrap:wrap;align-items:center;gap:var(--sp-4);margin-top:var(--sp-2)}
  .advisor__view{display:inline-flex;align-items:center;justify-content:center;min-height:2.625rem;padding:.7rem 1.2rem;
    border:0;border-radius:var(--r-m);background:var(--teal);color:#fff;font-size:var(--text-body);font-weight:500;line-height:1.2;text-decoration:none;transition:background .15s}
  .advisor__view:hover{background:var(--teal-600)} .advisor__view:active{background:var(--teal-700)}
  .advisor__reset{min-height:2.625rem;padding:.7rem 0;border:0;background:none;color:var(--teal);font-size:var(--text-body);
    font-weight:600;text-decoration:underline;text-underline-offset:3px}
  .advisor__reset:hover{color:var(--teal-700)}

  /* support */
  .advisor__support{display:flex;flex-wrap:wrap;gap:var(--sp-3);align-items:center;justify-content:space-between;
    margin-top:var(--sp-2);padding:16px 18px;border-radius:var(--r-l);background:var(--teal-5);border:1px solid var(--graphite-300);color:var(--schwarz)}
  .advisor__support .st{font-weight:700;font-size:var(--text-body)}
  .advisor__support .ss{font-size:var(--text-body-sm);color:var(--ink-60);margin-top:1px}
  .advisor__support-btns{display:flex;gap:8px;flex-wrap:wrap}
  .advisor__support a{display:inline-flex;align-items:center;height:2.5rem;padding:0 14px;border-radius:var(--r-m);
    font-size:var(--text-body-sm);font-weight:600;text-decoration:none;border:1px solid var(--teal);color:var(--teal);background:none}
  .advisor__support a.solid{background:var(--teal);color:#fff;border-color:var(--teal)}

  /* e-mail capture (result screen) */
  .advisor__capture{display:flex;flex-direction:column;gap:var(--sp-3);margin-top:var(--sp-4);padding-top:var(--sp-4);border-top:1px solid var(--graphite-300)}
  .advisor__capture-q{margin:0;font-size:var(--text-body-sm);font-weight:700;color:var(--schwarz)}
  .advisor__capture-row{display:grid;grid-template-columns:1fr 1fr;align-items:stretch;gap:var(--sp-4)}
  .advisor__capture-row .advisor__field,.advisor__capture-row .advisor__optin,.advisor__capture-row .advisor__send{min-height:3rem}
  .advisor__capture-row>.advisor__field{min-width:0}
  .advisor__field{display:flex;align-items:center;gap:var(--sp-3);padding:0 .9375rem;background:var(--white);border:1px solid var(--graphite-300);border-radius:var(--r-m);transition:border-color .15s ease}
  .advisor__field:focus-within{border-color:var(--teal)}
  .advisor__field-ico{width:20px;height:20px;flex:0 0 auto}
  .advisor__field-ico--mail{fill:none;stroke:var(--teal);stroke-width:1.8}
  .advisor__input{flex:1 1 auto;min-width:0;border:0;outline:0;background:transparent;padding:.7rem 0;font-family:inherit;font-size:var(--text-body);color:var(--schwarz)}
  .advisor__input::placeholder{color:var(--graphite-500)}
  .advisor__capture-end{min-width:0;display:flex;align-items:stretch;gap:var(--sp-3)}
  .advisor__capture-end .advisor__optin{flex:1 1 auto;min-width:0}
  .advisor__capture-end .advisor__send{flex:0 0 auto}
  .advisor__optin{display:flex;align-items:center;gap:.5625rem;padding:12px 16px;border-radius:var(--r-m);cursor:pointer;
    background:var(--white);border:1px solid var(--graphite-300);color:var(--schwarz);font-size:var(--text-body-sm);transition:background .15s ease,border-color .15s ease}
  .advisor__optin.is-on{border-color:var(--teal)}
  .advisor__optin input{position:absolute;opacity:0;width:0;height:0}
  .advisor__optin-box{flex:0 0 auto;width:1.125rem;height:1.125rem;border-radius:.1875rem;border:1px solid var(--graphite-300);background:var(--white);display:grid;place-items:center;transition:background .12s ease,border-color .12s ease}
  .advisor__optin.is-on .advisor__optin-box{background:var(--teal);border-color:var(--teal)}
  .advisor__optin.is-on .advisor__optin-box::after{content:"";width:.34rem;height:.6rem;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
  .advisor__optin input:focus-visible + .advisor__optin-box{box-shadow:0 0 0 3px var(--teal-10)}
  .advisor__send{flex:0 0 auto;align-self:stretch;display:grid;place-items:center;width:48px;border:0;border-radius:var(--r-m);background:var(--teal);color:#fff;cursor:pointer;transition:background .15s ease}
  .advisor__send:hover{background:var(--teal-600)}
  .advisor__send svg{width:20px;height:20px}
  .advisor__send-label{display:none}
  .advisor__optin-info{display:none;align-items:flex-start;gap:8px;margin:0;padding:10px 14px;border-radius:var(--r-m);background:#E6F1FB;color:#185FA5;font-size:var(--text-body-sm);line-height:1.5}
  .advisor__optin-info.is-shown{display:flex}
  .advisor__optin-info svg{flex:0 0 auto;width:18px;height:18px;margin-top:1px}
  .advisor__legal{margin:0;font-size:var(--text-body-sm);color:var(--ink-60)}
  .advisor__legal a{color:var(--teal)}

        var t=0,f=0; for(var j=0;j<ms.length;j++){ optHas(ms[j],o)?t++:f++; }
        if(t>0&&f>0) sep++;
      });
      return sep>=2;
    }
    /* multi-select is optional, so even one addable (reachable) option makes it worth showing. */
    if(st.type==="multi"){
      for(var i=0;i<st.opts.length;i++){ var o=st.opts[i];
        if(o.media&&a.media&&o.media!==a.media) continue;
        if(o.solo||o.v==="open"||o.v==="unsure"||o.v==="egal") continue;
        if(CAT.products.some(function(p){return matches(p,applyAns(id,o,a));})) return true;
        if(optState(id,o,a,false).swap) return true;
      }
      return false;
    }
    /* single-select is forced, so it must offer a GENUINE choice: >=2 options that lead to
       DIFFERENT result sets. Sets are compared by matching product id (not series), so a variant/
       price change still counts (e.g. BUS Taster 1/2/3 → different Maxior pages). If every reachable
       option yields the identical set, the question can't change the recommendation → skip it.
       (Steps whose choice defers to a conditional sub-step — e.g. colour "Weitere Farben" → use a
       custom `disc` instead, since the bucket hides the sub-step's finer split.) A dead option with
       a "wechseln?" redirect (BUS upsell) still keeps the step visible. */
    var sigs={};
    for(var i=0;i<st.opts.length;i++){ var o=st.opts[i];
      if(o.media&&a.media&&o.media!==a.media) continue;
      if(o.solo||o.v==="open"||o.v==="unsure"||o.v==="egal") continue; /* pass-through / "weiß nicht" options aren't real discriminators */
      var ms=CAT.products.filter(function(p){return matches(p,applyAns(id,o,a));});
      if(ms.length){ sigs[ms.map(function(p){return p.id;}).sort().join(",")]=1; if(Object.keys(sigs).length>=2) return true; }
      else if(optState(id,o,a,false).swap) return true; /* a dead option that offers a "wechseln?" redirect is worth showing */
    }
    return false; /* fewer than 2 distinct outcomes and no redirect → the question can't change anything */
  }
  /* A step is shown if allowed (vis) AND (already answered OR still discriminating). Keeping
     answered steps means a later answer can't retroactively hide an earlier one and jump the
     progress bar backward — only not-yet-answered future steps auto-hide. */
  function visibleSteps(a){ return CAT.order.filter(function(id){
    if(!ST(id).vis(a)) return false;
    var v=a[id], ans=ST(id).type==="multi"?(Array.isArray(v)&&v.length>0):(v!=null);
    return ans||discriminates(id,a);
  }); }

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  var root=document.getElementById("advisor");
  var quizEl=document.getElementById("quiz");
  var resEl=document.getElementById("results");

  /* toggle open/close */
  Array.prototype.forEach.call(root.querySelectorAll("[data-ai-toggle]"),function(b){
    b.addEventListener("click",function(){
      var open=root.classList.toggle("is-open");
      root.querySelector(".advisor__bar").setAttribute("aria-expanded",open?"true":"false");
      if(open && !state.id){ goTo(visibleSteps(state.a)[0]); }
    });
  });

  function optHTML(o,selected,stt){
    stt=stt||{};
    var sub = stt.off
      ? '<span class="advisor__opt-note">'+esc(stt.note||"")+(stt.swap?' · <span class="advisor__opt-switch" data-swap="1">wechseln?</span>':'')+'</span>'
      : (o.od?'<span class="advisor__opt-sub">'+esc(o.od)+'</span>':'');
    var badge = (!stt.off&&stt.count)?'<span class="advisor__opt-count">'+stt.count+(stt.count===1?' Modell':' Modelle')+'</span>':'';
    var body = '<span class="advisor__opt-label">'+esc(o.ol)+'</span>'+sub+badge;
    return '<button type="button" class="advisor__opt'+(selected?' is-active':'')+(stt.off?' is-off':'')+(o.sw?' has-swatch':'')+'" data-v="'+o.v+'"'+(stt.off?' aria-disabled="true"':'')+' aria-pressed="'+(selected?'true':'false')+'">'
      +(o.sw?'<span class="advisor__swatch" style="background:'+o.sw+'" aria-hidden="true"></span><span class="advisor__opt-body">'+body+'</span>':body)
      +'</button>';
  }

  function renderStep(id){
    root.classList.remove("is-result"); resEl.hidden=true;
    state.id=id;
    var st=ST(id),a=state.a,vs=visibleSteps(a),pos=vs.indexOf(id),total=vs.length;
    /* Options + count reflect answers UP TO this step only (see trimFuture) so a later choice
       can never disable an earlier option when the user navigates back. */
    var av=trimFuture(id,a);
    var multi=st.type==="multi", cur=av[id];
    var opts=st.opts.filter(function(o){
      if(o.media&&av.media&&o.media!==av.media) return false;
      /* option explicitly not offered on a combo (Briefkasten/Paketbox) path */
      if(o.notForCombo && av.combo && av.combo!=="none") return false;
      /* soft-pref option: only offer it if it separates the still-matching set — i.e. some
         match has the attribute and some don't. If none have it, or ALL have it, it can't
         rank anything, so it's redundant → hide. */
      if(st.soft && !o.solo){
        var ms=CAT.products.filter(function(p){return matches(p,av);}), t=0;
        for(var mi=0;mi<ms.length;mi++){ if(optHas(ms[mi],o)) t++; }
        if(t===0 || t===ms.length) return false;
      }
      return true;
    }).map(function(o){
      var sel=multi?((av[id]||[]).indexOf(o.v)>-1):(cur===o.v);
      var stt=optState(id,o,av,sel);
      if(sel&&!o.solo&&stt.count==null&&!stt.off) stt.count=liveCount(applyAns(id,o,av)); /* selected option keeps its count too */
      if(o.v==="egal"||o.v==="open"||o.v==="unsure") delete stt.count;
      /* dead option: replace the generic "kein passendes Modell" with the exact conflicting answer, if known */
      if(stt.off && stt.note==="derzeit kein passendes Modell"){ var r=deadReason(id,o,av); if(r) stt.note=r; }
      return optHTML(o,sel,stt);
    }).join("");
    var dots=""; for(var d=0;d<total;d++) dots+='<span class="'+(d<pos?"is-done":(d===pos?"is-current":""))+'"></span>';
    var isLast=pos===total-1;
    var canNext = multi ? true : (st.req ? cur!=null : true);
    var lc=liveCount(av);
    var flash=(id===CAT.flashStep)?state.flash:""; if(id===CAT.flashStep) state.flash=null;
    quizEl.innerHTML=''
      +'<div class="advisor__step">'
      +'<div class="advisor__progress"><span class="advisor__progress-dots">'+dots+'</span>'
        +'<span class="advisor__progress-label">Schritt '+(pos+1)+' von '+total+'</span></div>'
      +'<h3 class="advisor__q">'+esc(st.q)+'</h3>'
      +(st.help?'<p class="advisor__help">'+esc(st.help)+'</p>':'')
      +(flash?'<p class="advisor__hint advisor__flash">'+esc(flash)+'</p>':'')
      +'<div class="advisor__opts'+(st.opts.some(function(o){return o.sw;})?' advisor__opts--swatch':'')+'" role="group" aria-label="'+esc(st.q)+'">'+opts+'</div>'
      +'<div class="advisor__nav">'
        +'<div class="advisor__nav-left">'
          +(pos>0?'<button type="button" class="advisor__back" data-back>'+CHEV+'Zurück</button>':'')
          +'<span class="advisor__count'+(lc===0?' is-none':'')+'">'+(lc===0?'Diese Kombination ergibt derzeit <b>kein</b> passendes Modell – passen Sie eine Angabe an.':'Aktuell passen <b>'+lc+'</b> von '+TOTAL+' Modellen zu Ihrer Auswahl.')+'</span>'
        +'</div>'
        +'<button type="button" class="advisor__forward'+(isLast?' advisor__forward--cta':'')+'" data-next'+(canNext?'':' disabled')+'>'+(isLast?'Empfehlung anzeigen':'Weiter')+CHEV+'</button>'
      +'</div>'
      +'</div>';
    wireStep(id);
    var stepEl=quizEl.querySelector(".advisor__step");
    requestAnimationFrame(function(){ stepEl.classList.add("is-in"); });
  }

  function wireStep(id){
    var st=ST(id),a=state.a,multi=st.type==="multi";
    Array.prototype.forEach.call(quizEl.querySelectorAll(".advisor__opt"),function(btn){
      btn.addEventListener("click",function(ev){
        if(ev.target&&ev.target.closest&&ev.target.closest("[data-swap]")){ ev.preventDefault(); switchToIP(); return; }
        if(btn.classList.contains("is-off")) return;   /* unreachable option – no selection */
        var v=btn.getAttribute("data-v");
        if(multi){
          var old=(a[id]||[]).join(","), arr=(a[id]||[]).slice(), o=null;
          st.opts.forEach(function(x){if(x.v===v)o=x;});
          if(o&&o.solo){ arr=[v]; }
          else { var i=arr.indexOf(v); if(i>-1)arr.splice(i,1); else {arr.push(v); arr=arr.filter(function(x){return x!=="none";});} }
          if(arr.join(",")!==old) clearFuture(id,a);   /* a changed answer invalidates downstream steps */
          a[id]=arr; renderStep(id);
        } else {
          if(a[id]!==v) clearFuture(id,a);              /* a changed answer invalidates downstream steps */
          a[id]=v;
          renderStep(id);   /* reflect the choice; advance only when the user presses Weiter (no auto-advance) */
        }
      });
    });
    var nb=quizEl.querySelector("[data-next]"); if(nb) nb.addEventListener("click",function(){ if(!nb.hasAttribute("disabled")) advance(id); });
    var bb=quizEl.querySelector("[data-back]"); if(bb) bb.addEventListener("click",function(){ goBack(id); });
  }

  function advance(id){
    if(state.edit){ var ve=visibleSteps(state.a),gap=null; for(var i=0;i<ve.length;i++){ if(!isAnswered(ve[i])){gap=ve[i];break;} } if(gap){goTo(gap);}else{renderResult();} return; }
    var vs=visibleSteps(state.a),pos=vs.indexOf(id);
    if(pos<0||pos+1>=vs.length) renderResult(); else goTo(vs[pos+1]);
  }
  function goBack(id){ var vs=visibleSteps(state.a),pos=vs.indexOf(id); if(pos<=0){/*back to bar*/ collapse();} else goTo(vs[pos-1]); }
  function goTo(id){ state.id=id; renderStep(id); }
  function collapse(){ root.classList.remove("is-open"); root.querySelector(".advisor__bar").setAttribute("aria-expanded","false"); }

  /* ---------- result ---------- */
  /* Placeholder product images (local folder). Live integration swaps these for shop CDN images. */
  var IMG="Kaufbrater Images/";
  function imgSrc(f){ return encodeURI(IMG+f); }
  function thumbImg(p){ var ph=imgSrc(CAT.imgPlaceholder);
    return '<img src="'+imgSrc(p.img||CAT.imgPlaceholder)+'" alt="'+esc(p.name||"")+'" onerror="this.onerror=null;this.src=\''+ph+'\'">'; }
  function fmtPrice(n){ return (n%1===0)?String(n):n.toFixed(2).replace(".",","); }
  function emptyCard(hint){
    return '<div class="advisor__empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
      +'<div><strong>Mit dieser Kombination haben wir kein exaktes Modell gefunden.</strong><p>'+esc(hint)+'</p></div></div>';
  }
  function recHTML(p,a,best,solo){
    var name='<span class="advisor__rec-name">'+esc(p.name)+'</span>';
    var price=p.priceNote?'<span class="advisor__rec-price">'+esc(p.priceNote)+'</span>':'<span class="advisor__rec-price">ab '+fmtPrice(p.price)+' € <small>inkl. MwSt.</small></span>';
    var chev='<span class="advisor__rec-chev" aria-hidden="true">'+CHEV+'</span>';
    var thumb='<span class="advisor__rec-thumb advisor__rec-thumb--img">'+thumbImg(p)+'</span>';
    if(solo){
      return '<a class="advisor__rec advisor__rec--solo" href="'+BASE+p.url+'" target="_blank" rel="noopener">'
        +'<span class="advisor__rec-solo-row">'+thumb+'<span class="advisor__rec-solo-body">'+name+price+'</span>'+chev+'</span>'
      +'</a>';
    }
    return '<a class="advisor__rec'+(best?' is-best':'')+'" href="'+BASE+p.url+'" target="_blank" rel="noopener">'
      +'<div class="advisor__rec-top">'+thumb
        +'<span class="advisor__rec-head">'+name+price+'</span>'+chev+'</div>'
    +'</a>';
  }
  function renderResult(){
    state.id="__result__"; state.edit=false;
    var a=state.a,list=CAT.products.filter(function(p){return matches(p,a);});
    list.sort(function(x,y){var d=score(y,a)-score(x,a);return d!==0?d:x.price-y.price;});
    /* One card per model series — the feed lists separate pages per Taster count;
       after ranking, keep the best-fitting page per series (skip for products w/o series). */
    var seenSeries={}; list=list.filter(function(p){ if(!p.series)return true; if(seenSeries[p.series])return false; seenSeries[p.series]=1; return true; });
    var exact=list.length, relaxed=false;
    /* Only relax when NOTHING matches exactly. Never pad exact results with
       near-matches that silently drop a hard filter (e.g. Zutritt/Fingerprint). */
    if(exact===0){ var b={}; CAT.relaxKeys.forEach(function(k){ if(a[k]!=null) b[k]=a[k]; }); var seenR={}; var extra=CAT.products.filter(function(p){return matches(p,b)&&list.indexOf(p)===-1;}).sort(function(x,y){return x.price-y.price;}).filter(function(p){ if(!p.series)return true; if(seenR[p.series])return false; seenR[p.series]=1; return true; }); list=extra.slice(0,2); relaxed=list.length>0; }
    else list=list.slice(0,3);

    var title = relaxed ? 'Am ehesten passend' : (exact>=2 ? '<strong>'+exact+'</strong> passende '+CAT.nounPl : 'Unsere Top-Empfehlung');
    var solo = list.length===1;
    var relaxNote = relaxed ? '<p class="advisor__hint">Kein Modell passt exakt zu allen Angaben – diese kommen Ihrer Auswahl am nächsten. Passen Sie einzelne Angaben an oder lassen Sie sich kostenlos beraten.</p>' : '';
    var recs = list.length ? '<div class="advisor__recs'+(solo?' advisor__recs--solo':'')+'">'+list.map(function(p,i){return recHTML(p,a,i===0&&list.length>1&&!relaxed,solo);}).join("")+'</div>' : "";
    var note = list.length ? CAT.resultNote(a) : "";
    var body = list.length ? ('<h3 class="advisor__result-title">'+title+'</h3>'+relaxNote+recs+note) : emptyHTML(a);
    var sup=CAT.support;

    resEl.innerHTML='<div class="advisor__result">'
      +'<div class="advisor__summary">'+summaryChips(a)+'</div>'
      +body
      +'<div class="advisor__actions">'
        +(list.length?'<a class="advisor__view" href="'+BASE+CAT.catUrl+'" target="_blank" rel="noopener">Alle passenden Modelle ansehen</a>':'')
        +'<button type="button" class="advisor__reset" data-reset>Quiz neu starten</button>'
      +'</div>'
      +captureHTML()
      +(sup?('<div class="advisor__support"><div><div class="st">'+esc(sup.title)+'</div><div class="ss">'+esc(sup.sub)+'</div></div>'
        +'<div class="advisor__support-btns"><a class="solid" href="'+sup.primaryHref+'" target="_blank" rel="noopener">'+esc(sup.primaryLabel)+'</a>'
        +'<a href="'+sup.secondaryHref+'" target="_blank" rel="noopener">'+esc(sup.secondaryLabel)+'</a></div></div>'):'')
    +'</div>';
    root.classList.add("is-result"); resEl.hidden=false;
    wireResult();
    var r=resEl.querySelector(".advisor__result"); requestAnimationFrame(function(){ r.classList.add("is-in"); });
  }
  function wireResult(){
    var rs=resEl.querySelector("[data-reset]"); if(rs) rs.addEventListener("click",function(){ state.a={}; state.id=null; state.edit=false; root.classList.remove("is-result"); resEl.hidden=true; goTo(visibleSteps(state.a)[0]); });
    wireCapture();
  }
  /* ---------- e-mail capture (front-end mock; wire to backend at go-live) ---------- */
  function captureHTML(){
    return '<div class="advisor__capture" data-result-capture>'
      +'<p class="advisor__capture-q">Empfehlung per E-Mail erhalten?</p>'
      +'<div class="advisor__capture-row">'
        +'<div class="advisor__field">'
          +'<svg class="advisor__field-ico advisor__field-ico--mail" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>'
          +'<input type="email" class="advisor__input" data-email autocomplete="email" placeholder="E-Mail-Adresse eingeben" aria-label="E-Mail-Adresse">'
        +'</div>'
        +'<div class="advisor__capture-end">'
          +'<label class="advisor__optin"><input type="checkbox" data-optin><span class="advisor__optin-box" aria-hidden="true"></span><span>Schicken Sie mir Metzler News &amp; Angebote.</span></label>'
          +'<button type="button" class="advisor__send" data-email-send aria-label="Absenden"><span class="advisor__send-label">Absenden</span>'+CHEV+'</button>'
        +'</div>'
      +'</div>'
      +'<p class="advisor__optin-info" data-optin-info role="status"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 11.5v4.5"/><path d="M12 7.7h.01"/></svg><span>Wir senden Ihnen eine E-Mail mit einem Freischalt-Link für den Erhalt unseres Newsletters. Die Abmeldung ist jederzeit möglich.</span></p>'
      +'<p class="advisor__legal">Hinweise zum Datenschutz finden Sie <a href="'+BASE+'datenschutz" target="_blank" rel="noopener">hier</a>.</p>'
    +'</div>';
  }
  function wireCapture(){
    var cap=resEl.querySelector("[data-result-capture]");
    if(!cap) return;
    var pristine=cap.innerHTML;
    var email=cap.querySelector("[data-email]");
    var optin=cap.querySelector("[data-optin]");
    var optinLabel=cap.querySelector(".advisor__optin");
    var optinInfo=cap.querySelector("[data-optin-info]");
    var revertTimer;
    optin.addEventListener("change",function(){
      optinLabel.classList.toggle("is-on",optin.checked);
      optinInfo.classList.toggle("is-shown",optin.checked);
    });
    function submit(){
      var v=email.value.trim();
      if(!v){ email.focus(); return; }
      lead.email=v; lead.news=optin.checked;
      cap.innerHTML='<div class="advisor__sent" role="status"><svg class="advisor__sent-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M8.4 12.3l2.4 2.4 4.8-5.4"/></svg><p class="advisor__sent-text">Ihre Empfehlung wird an <strong>'+esc(v)+'</strong> gesendet'+(lead.news?" – inkl. News &amp; Angebote":"")+'.'+(lead.news?" Bitte bestätigen Sie die E-Mail in Ihrem Postfach.":"")+'</p></div>';
      clearTimeout(revertTimer);
      revertTimer=setTimeout(function(){ cap.innerHTML=pristine; wireCapture(); },4000);
    }
    email.addEventListener("keydown",function(e){ if(e.key==="Enter"){ e.preventDefault(); submit(); } });
    cap.querySelector("[data-email-send]").addEventListener("click",submit);
  }

  /* ---------- category selection + standalone-preview switcher ---------- */
  function detectCat(){ var p=(location.pathname+location.search).toLowerCase();
    if(/sprech/.test(p))return"sprechanlage";
    if(/sicherheitstechnik|kamera|alarm/.test(p))return"sicherheit";
    if(/muelltonnenbox|muelltonne/.test(p))return"muell";
    if(/paketbox/.test(p))return"paketbox";
    if(/briefkasten/.test(p))return"briefkasten";
    if(/klingel/.test(p))return"tuerklingel";
    return null; }
  function applyChrome(){
    document.title="Metzler "+CAT.nounPl+"-Kaufberater";
    var ct=document.querySelector(".page-head .ct"); if(ct)ct.textContent=CAT.nounPl;
    var sub=document.querySelector(".advisor__bar-sub"); if(sub)sub.textContent=CAT.barSub;
  }
  function setCat(key){
    CAT=CATS[key]||CATS.sprechanlage; TOTAL=liveCount({});
    state={a:{},id:null,edit:false}; lead={email:"",news:false};
    root.classList.remove("is-open","is-result"); resEl.hidden=true; resEl.innerHTML=""; quizEl.innerHTML="";
    root.querySelector(".advisor__bar").setAttribute("aria-expanded","false");
    applyChrome();
    var sw=document.getElementById("catSwitch");
    if(sw) Array.prototype.forEach.call(sw.querySelectorAll("button"),function(b){ b.classList.toggle("is-on",b.getAttribute("data-cat")===CAT.key); });
  }
  var detected=detectCat();
  setCat(detected||"sprechanlage");
  (function initSwitch(){
    var sw=document.getElementById("catSwitch"); if(!sw) return;
    if(detected){ sw.hidden=true; return; }   /* the embedding category page already fixes the category */
    sw.hidden=false;
    sw.innerHTML=Object.keys(CATS).map(function(k){return '<button type="button" data-cat="'+k+'"'+(k===CAT.key?' class="is-on"':'')+'>'+esc(CATS[k].tab)+'</button>';}).join("");
    Array.prototype.forEach.call(sw.querySelectorAll("button"),function(b){ b.addEventListener("click",function(){ var k=b.getAttribute("data-cat"); if(CAT&&k===CAT.key)return; setCat(k); }); });
  })();
})();
</script>
